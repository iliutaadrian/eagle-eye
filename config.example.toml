# Eagle Eye config — copy to ~/.config/eagleeye/config.toml and edit.
# Any omitted key falls back to the built-in default.

[paths]
data_dir = "~/Documents/EagleEye"

[capture]
poll_interval = 1.5      # app-usage sampler poll (seconds)
idle_threshold = 60      # seconds idle before dwell time stops accruing

[keylog]
enabled = true
idle_gap = 1.0           # new keystroke burst after a pause this long

[screenshot]
enabled = true
interval = 10            # seconds between shots
idle_skip = 60           # skip shot if idle longer than this
max_width = 1024         # downscale width (px)
jpeg_quality = "low"     # low | normal | high
describe = true          # caption EVERY frame via headless Claude Code
describe_workers = 3     # concurrent caption workers (raise if captions lag capture)
dedup = true             # skip a frame identical to the previous kept one (no disk, no caption)
dedup_threshold = 3      # max perceptual-hash bit distance still treated as identical
dedup_max_skips = 30     # force a fresh frame after this many skips (heartbeat)

[browsers]               # frontmost app name -> osascript dialect
Safari = "safari"
"Google Chrome" = "chromium"
Arc = "chromium"
"Brave Browser" = "chromium"
"Microsoft Edge" = "chromium"

[analysis]
model = "haiku"
claude_flags = ["--dangerously-skip-permissions"]

[exclude]
apps = []                # STUB: app names to skip capturing (not yet enforced)
